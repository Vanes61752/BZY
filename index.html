<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Calorie & Macros Calculator | Миффлин-Сан Жеор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            padding: 20px 16px 40px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* главная карточка — адаптив, ширина ~400px на телефоне */
        .calculator-card {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2), 0 1px 3px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            backdrop-filter: blur(0px);
            transition: all 0.2s ease;
        }

        /* внутренние отступы */
        .card-inner {
            padding: 24px 22px 32px;
        }

        /* заголовок */
        h1 {
            font-size: 1.85rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #1f2b3c, #2c3e4e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 6px;
            line-height: 1.2;
        }

        .sub {
            font-size: 0.85rem;
            color: #5c6f87;
            border-left: 3px solid #6c8fb3;
            padding-left: 10px;
            margin-bottom: 28px;
            font-weight: 450;
        }

        /* группа полей */
        .input-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #1e2f3e;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        label i {
            font-weight: 400;
            font-size: 0.85rem;
            color: #5b7a9a;
        }

        /* крупные поля ввода */
        input, select {
            width: 100%;
            padding: 16px 18px;
            font-size: 1.1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 28px;
            background-color: #ffffff;
            transition: all 0.2s;
            font-weight: 500;
            color: #0a1c2a;
            outline: none;
            font-family: inherit;
        }

        input:focus, select:focus {
            border-color: #3b7cbf;
            box-shadow: 0 0 0 3px rgba(59, 124, 191, 0.2);
        }

        /* радио группа (пол) */
        .radio-group {
            display: flex;
            gap: 24px;
            background: #f8fafd;
            padding: 12px 16px;
            border-radius: 48px;
            border: 1px solid #e2edf7;
            margin-top: 5px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 500;
            font-size: 1rem;
        }

        .radio-option input {
            width: 20px;
            height: 20px;
            accent-color: #2c6e9e;
            margin: 0;
            padding: 0;
        }

        /* кнопка на всю ширину */
        .calc-btn {
            width: 100%;
            background: linear-gradient(98deg, #1e4b6e, #2c6e9e);
            border: none;
            padding: 18px 16px;
            font-size: 1.25rem;
            font-weight: 700;
            color: white;
            border-radius: 60px;
            margin-top: 12px;
            margin-bottom: 28px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 8px 18px rgba(0, 30, 50, 0.2);
            letter-spacing: 0.3px;
        }

        .calc-btn:active {
            transform: scale(0.97);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        /* блок результата */
        .result-box {
            background: #f0f6fe;
            border-radius: 32px;
            padding: 20px 20px;
            margin-top: 8px;
            border: 1px solid #cde1f0;
            transition: all 0.2s;
        }

        .result-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a4c6e;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px dashed #b9d2ec;
            padding-bottom: 8px;
        }

        .macro-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 12px;
            margin-top: 12px;
        }

        .macro-card {
            background: white;
            border-radius: 24px;
            flex: 1;
            min-width: 90px;
            text-align: center;
            padding: 12px 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border: 1px solid #dfecf5;
        }

        .macro-value {
            font-size: 1.65rem;
            font-weight: 800;
            color: #1e4663;
            line-height: 1.2;
        }

        .macro-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            color: #5d7f9e;
            margin-top: 6px;
        }

        .kcal-display {
            background: #ffffffd9;
            border-radius: 28px;
            padding: 14px 18px;
            margin-bottom: 18px;
            text-align: center;
            box-shadow: inset 0 1px 2px #00000008, 0 2px 5px rgba(0,0,0,0.02);
        }

        .kcal-number {
            font-size: 2.2rem;
            font-weight: 800;
            color: #1f6392;
            letter-spacing: -0.5px;
        }

        .error-msg {
            color: #c7254e;
            background: #ffe6ec;
            padding: 14px;
            border-radius: 28px;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: center;
            margin-top: 12px;
        }

        hr {
            margin: 15px 0 5px;
            border: none;
            border-top: 1px solid #caddf0;
        }

        /* адаптация под очень узкие экраны (ширина < 400px) */
        @media (max-width: 450px) {
            body {
                padding: 12px 12px 30px;
            }
            .card-inner {
                padding: 18px 18px 28px;
            }
            .radio-group {
                gap: 12px;
                padding: 10px 12px;
            }
            .macro-value {
                font-size: 1.4rem;
            }
            .kcal-number {
                font-size: 1.9rem;
            }
            .calc-btn {
                padding: 15px;
                font-size: 1.15rem;
            }
        }

        /* дополнительный штрих: крупные поля и удобный таргет */
        input, select, .calc-btn {
            font-size: 1rem;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 20px;
            color: #6e8dad;
        }
    </style>
</head>
<body>
<div class="calculator-card">
    <div class="card-inner">
        <h1>⚡ Калории & БЖУ</h1>
        <div class="sub">Формула Миффлина — Сан Жеора · Коррекция под цель</div>

        <!-- Пол (radio) -->
        <div class="input-group">
            <label>👤 Пол</label>
            <div class="radio-group">
                <label class="radio-option">
                    <input type="radio" name="gender" value="male" checked> Мужской
                </label>
                <label class="radio-option">
                    <input type="radio" name="gender" value="female"> Женский
                </label>
            </div>
        </div>

        <!-- Возраст -->
        <div class="input-group">
            <label>📅 Возраст <i>(лет)</i></label>
            <input type="number" id="age" placeholder="например, 28" value="30" min="1" max="130" step="1">
        </div>

        <!-- Рост -->
        <div class="input-group">
            <label>📏 Рост <i>(см)</i></label>
            <input type="number" id="height" placeholder="например, 175" value="175" min="50" max="260" step="0.5">
        </div>

        <!-- Вес -->
        <div class="input-group">
            <label>⚖️ Вес <i>(кг)</i></label>
            <input type="number" id="weight" placeholder="например, 70.5" value="70" min="10" max="350" step="0.1">
        </div>

        <!-- Цель (select) -->
        <div class="input-group">
            <label>🎯 Цель</label>
            <select id="goal">
                <option value="loss">🔥 Похудение</option>
                <option value="maintain" selected>✨ Поддержание формы</option>
                <option value="gain">💪 Набор массы</option>
            </select>
        </div>

        <!-- Кнопка рассчитать -->
        <button class="calc-btn" id="calculateBtn">Рассчитать норму</button>

        <!-- Блок с результатом -->
        <div id="resultContainer">
            <!-- Динамически обновляемый результат -->
            <div class="result-box" id="resultDisplay">
                <div class="result-title">📊 Ваш персональный расчёт</div>
                <div style="text-align: center; color: #4b6f8e; padding: 16px 6px;">
                    Заполните параметры и нажмите «Рассчитать»
                </div>
            </div>
        </div>
        <footer>Миффлин-Сан Жеор ± активность не требуется — коррекция по цели</footer>
    </div>
</div>

<script>
    (function() {
        // DOM элементы
        const genderMale = document.querySelector('input[value="male"]');
        const genderFemale = document.querySelector('input[value="female"]');
        const ageInput = document.getElementById('age');
        const heightInput = document.getElementById('height');
        const weightInput = document.getElementById('weight');
        const goalSelect = document.getElementById('goal');
        const calcBtn = document.getElementById('calculateBtn');
        const resultDisplay = document.getElementById('resultDisplay');

        // Вспомогательная функция: валидация и парсинг чисел
        function getValidNumber(inputElement, fieldName, minVal, maxVal, isInteger = false) {
            let rawValue = inputElement.value.trim();
            if (rawValue === "") {
                throw new Error(`${fieldName} не может быть пустым.`);
            }
            let number = isInteger ? parseInt(rawValue, 10) : parseFloat(rawValue);
            if (isNaN(number)) {
                throw new Error(`${fieldName} должно быть числом.`);
            }
            if (isInteger && !Number.isInteger(number)) {
                throw new Error(`${fieldName} должно быть целым числом.`);
            }
            if (number < minVal || number > maxVal) {
                throw new Error(`${fieldName} должно быть от ${minVal} до ${maxVal}.`);
            }
            return number;
        }

        // Получить выбранный пол
        function getSelectedGender() {
            if (genderMale.checked) return 'male';
            if (genderFemale.checked) return 'female';
            return 'male'; // fallback
        }

        // Получить коэффициент и проценты БЖУ в зависимости от цели
        function getGoalParams(goal) {
            switch(goal) {
                case 'loss':
                    return { factor: 0.85, proteinPct: 35, fatPct: 25, carbPct: 40 };
                case 'maintain':
                    return { factor: 1.0, proteinPct: 30, fatPct: 25, carbPct: 45 };
                case 'gain':
                    return { factor: 1.15, proteinPct: 25, fatPct: 25, carbPct: 50 };
                default:
                    return { factor: 1.0, proteinPct: 30, fatPct: 25, carbPct: 45 };
            }
        }

        // Основная функция расчета
        function calculateCaloriesAndMacros() {
            try {
                // 1. Получаем и валидируем входные данные
                const age = getValidNumber(ageInput, 'Возраст', 1, 130, true);
                const height = getValidNumber(heightInput, 'Рост', 50, 260, false);
                const weight = getValidNumber(weightInput, 'Вес', 10, 350, false);
                const gender = getSelectedGender();
                const goal = goalSelect.value;

                // 2. Формула Миффлина-Сан Жеора (BMR)
                let bmr;
                if (gender === 'male') {
                    bmr = 10 * weight + 6.25 * height - 5 * age + 5;
                } else {
                    bmr = 10 * weight + 6.25 * height - 5 * age - 161;
                }

                // Проверка на некорректный BMR (теоретически >0)
                if (bmr <= 0 || !isFinite(bmr)) {
                    throw new Error("Некорректный базовый метаболизм, проверьте параметры.");
                }

                // 3. Коррекция калорий под цель (коэффициент)
                const { factor, proteinPct, fatPct, carbPct } = getGoalParams(goal);
                let dailyCalories = bmr * factor;

                // Округлим калории до целого числа для красоты
                dailyCalories = Math.round(dailyCalories);
                if (dailyCalories < 800) {
                    // слишком низкая калорийность, но допустим (экстремальные параметры)
                    // просто предупредим через консоль, но показываем корректно
                    console.info("Калорийность низкая, но расчёт верен.");
                }

                // 4. Расчёт БЖУ в граммах (белки, жиры, углеводы)
                // энергетическая ценность: белки 4ккал/г, жиры 9ккал/г, углеводы 4ккал/г
                let proteinGrams = (dailyCalories * (proteinPct / 100)) / 4;
                let fatGrams = (dailyCalories * (fatPct / 100)) / 9;
                let carbsGrams = (dailyCalories * (carbPct / 100)) / 4;

                // округление до 1 знака после запятой для удобства
                proteinGrams = proteinGrams.toFixed(1);
                fatGrams = fatGrams.toFixed(1);
                carbsGrams = carbsGrams.toFixed(1);

                // 5. Формирование результата (вывод)
                let goalText = "";
                if (goal === 'loss') goalText = "🔥 Похудение";
                else if (goal === 'maintain') goalText = "✨ Поддержание";
                else goalText = "💪 Набор массы";

                // Создаём блок с результатами
                resultDisplay.innerHTML = `
                    <div class="result-title">📊 ${goalText} · Результат</div>
                    <div class="kcal-display">
                        <div style="font-size: 0.85rem; font-weight: 500; color: #2c6288;">Суточная норма</div>
                        <div class="kcal-number">${dailyCalories} <span style="font-size: 1.1rem;">ккал</span></div>
                    </div>
                    <div class="macro-grid">
                        <div class="macro-card">
                            <div class="macro-value">${proteinGrams} <span style="font-size: 0.9rem;">г</span></div>
                            <div class="macro-label">🥩 Белки</div>
                            <div style="font-size:0.7rem; color:#6883a0;">${proteinPct}% от калорий</div>
                        </div>
                        <div class="macro-card">
                            <div class="macro-value">${fatGrams} <span style="font-size: 0.9rem;">г</span></div>
                            <div class="macro-label">🧈 Жиры</div>
                            <div style="font-size:0.7rem; color:#6883a0;">${fatPct}% от калорий</div>
                        </div>
                        <div class="macro-card">
                            <div class="macro-value">${carbsGrams} <span style="font-size: 0.9rem;">г</span></div>
                            <div class="macro-label">🍚 Углеводы</div>
                            <div style="font-size:0.7rem; color:#6883a0;">${carbPct}% от калорий</div>
                        </div>
                    </div>
                    <hr>
                    <div style="font-size: 0.72rem; text-align: center; color: #5f7c9a; margin-top: 8px;">
                        ⚡ Формула Миффлина-Сан Жеора × коэффициент цели
                    </div>
                `;
            } catch (error) {
                // Отображение ошибки в блоке результата
                resultDisplay.innerHTML = `
                    <div class="result-title">⚠️ Ошибка ввода</div>
                    <div class="error-msg">
                        ${error.message}<br>
                        <span style="font-size:0.8rem;">Проверьте возраст (1-130), рост (50-260 см), вес (10-350 кг)</span>
                    </div>
                `;
            }
        }

        // Дополнительная предварительная санитизация при клике
        function handleCalculate() {
            // небольшая косметическая проверка полей на пустоту (дополнительно)
            if (ageInput.value.trim() === "" || heightInput.value.trim() === "" || weightInput.value.trim() === "") {
                resultDisplay.innerHTML = `
                    <div class="result-title">📛 Не все данные</div>
                    <div class="error-msg">
                        Пожалуйста, заполните возраст, рост и вес перед расчётом.
                    </div>
                `;
                return;
            }
            calculateCaloriesAndMacros();
        }

        // Привязываем событие к кнопке
        calcBtn.addEventListener('click', handleCalculate);

        // (Опционально) Автоматический расчет при загрузке страницы с демо-значениями (пример)
        // Для удобства: выполним первичный расчёт с дефолтными числами (30 лет, 175 см, 70 кг, мужчина, поддержание)
        // чтобы пользователь сразу видел пример результата, согласно ТЗ это не запрещено.
        // Но чтобы не нарушать ожидания, сделаем предзаполнение с существующими значениями по умолчанию.
        window.addEventListener('DOMContentLoaded', () => {
            // если поля имеют значения по умолчанию (они установлены в HTML: возраст 30, рост 175, вес 70)
            // произведем корректный расчет при загрузке для демонстрации функционала
            // пользователь сразу видит работающий сервис.
            try {
                // небольшая проверка: если значения валидны, рассчитываем.
                const testAge = parseFloat(ageInput.value);
                const testHeight = parseFloat(heightInput.value);
                const testWeight = parseFloat(weightInput.value);
                if (!isNaN(testAge) && !isNaN(testHeight) && !isNaN(testWeight) && testAge>0 && testHeight>0 && testWeight>0) {
                    calculateCaloriesAndMacros();
                } else {
                    // если нет, покажем нейтральное состояние
                    resultDisplay.innerHTML = `
                        <div class="result-title">📊 Ваш персональный расчёт</div>
                        <div style="text-align: center; color: #4b6f8e; padding: 16px 6px;">
                            Введите данные и нажмите «Рассчитать»
                        </div>
                    `;
                }
            } catch(e) {
                // тихо
            }
        });
    })();
</script>
</body>
</html>
