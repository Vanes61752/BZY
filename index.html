<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NutriCalc — Твой КБЖУ</title>
    <style>
        :root {
            --accent: #007AFF;
            --accent-gradient: linear-gradient(135deg, #007AFF, #00C6FF);
            --accent-shadow: rgba(0, 122, 255, 0.2);
            --bg-light: #F2F2F7;
            --card-bg: #FFFFFF;
            --input-bg: #F9F9FB;
            --text-main: #1C1C1E;
            --text-dim: #8E8E93;
            --border: #E5E5EA;
        }

        .theme-female {
            --accent: #FF2D55;
            --accent-gradient: linear-gradient(135deg, #FF2D55, #FF5E7B);
            --accent-shadow: rgba(255, 45, 85, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .gender-switch {
            display: flex;
            background: var(--input-bg);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        .gender-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border: none;
            background: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-dim);
        }

        .gender-btn.active {
            background: #FFFFFF;
            color: var(--accent);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 700;
            text-transform: uppercase;
            padding-left: 4px;
        }

        input, select {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            width: 100%;
            -webkit-appearance: none;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            background: #FFFFFF;
        }

        .full-width {
            grid-column: span 3;
        }

        .calc-btn {
            background: var(--accent-gradient);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 8px 15px var(--accent-shadow);
        }

        .calc-btn:active {
            transform: scale(0.98);
        }

        .results {
            margin-top: 25px;
            background: var(--input-bg);
            border-radius: 18px;
            padding: 20px;
            display: none;
            border: 1px solid var(--border);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .res-main {
            text-align: center;
            margin-bottom: 15px;
        }

        .res-main span {
            display: block;
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 600;
        }

        .res-main strong {
            font-size: 36px;
            color: var(--text-main);
        }

        .macros {
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }

        .macro-card {
            flex: 1;
            background: #FFFFFF;
            padding: 12px 5px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .macro-card div:first-child {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }

        .macro-card div:last-child {
            font-size: 10px;
            color: var(--text-dim);
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 4px;
        }

        @media (max-width: 400px) {
            .grid-inputs { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="header">
        <h1>NutriCalc</h1>
    </div>

    <div class="gender-switch">
        <button class="gender-btn active" id="btnMale" onclick="setGender('male')">МУЖЧИНА</button>
        <button class="gender-btn" id="btnFemale" onclick="setGender('female')">ЖЕНЩИНА</button>
    </div>

    <div class="grid-inputs">
        <div class="input-group">
            <label>Возраст</label>
            <input type="number" id="age" value="21" inputmode="numeric">
        </div>
        <div class="input-group">
            <label>Рост (см)</label>
            <input type="number" id="height" value="178" inputmode="numeric">
        </div>
        <div class="input-group">
            <label>Вес (кг)</label>
            <input type="number" id="weight" value="77" inputmode="decimal">
        </div>

        <div class="input-group full-width">
            <label>Уровень активности</label>
            <!-- Значения value теперь точно соответствуют ключам в activityMap -->
            <select id="activity">
                <option value="minimal">Минимальная (сидячая работа)</option>
                <option value="low" selected>Низкая (1-3 тренировки)</option>
                <option value="medium">Средняя (3-5 тренировок)</option>
                <option value="high">Высокая (ежедневно)</option>
                <option value="extreme">Экстремальная (проф. спорт)</option>
            </select>
        </div>

        <div class="input-group full-width">
            <label>Ваша цель</label>
            <!-- Значения value теперь точно соответствуют переменной goal ("cut", "maintain", "bulk") -->
            <select id="goal">
                <option value="cut">Похудение (дефицит 15%)</option>
                <option value="maintain" selected>Поддержание веса</option>
                <option value="bulk">Набор массы (профицит 15%)</option>
            </select>
        </div>
    </div>

    <button class="calc-btn" onclick="calculate()">Рассчитать норму</button>

    <div class="results" id="resultsArea">
        <div class="res-main">
            <span>СУТОЧНАЯ НОРМА КАЛОРИЙ</span>
            <strong id="resKcal">0</strong> <small style="font-size: 14px;">ккал</small>
        </div>
        <div class="macros">
            <div class="macro-card">
                <div id="resP">0</div>
                <div>Белки (г)</div>
            </div>
            <div class="macro-card">
                <div id="resF">0</div>
                <div>Жиры (г)</div>
            </div>
            <div class="macro-card">
                <div id="resC">0</div>
                <div>Углеводы (г)</div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentGender = 'male';

    function setGender(gender) {
        currentGender = gender;
        const container = document.getElementById('mainContainer');
        const btnM = document.getElementById('btnMale');
        const btnF = document.getElementById('btnFemale');

        if (gender === 'female') {
            container.classList.add('theme-female');
            btnF.classList.add('active');
            btnM.classList.remove('active');
        } else {
            container.classList.remove('theme-female');
            btnM.classList.add('active');
            btnF.classList.remove('active');
        }
        
        if (document.getElementById('resultsArea').style.display === 'block') {
            calculate(true);
        }
    }

    function calculate(isAuto = false) {
        // Получаем данные
        const gender = currentGender;
        const age = parseInt(document.getElementById('age').value);
        const height = parseFloat(document.getElementById('height').value);
        const weight = parseFloat(document.getElementById('weight').value);
        const activity = document.getElementById('activity').value;
        const goal = document.getElementById('goal').value;

        // Проверка на пустые поля
        if (!weight || !height || !age || weight <= 0 || height <= 0 || age <= 0) {
            if (!isAuto) {
                alert('Пожалуйста, введите корректные данные (рост, вес, возраст).');
            } else {
                document.getElementById('resultsArea').style.display = 'none';
            }
            return;
        }

        // --- ВАША ИНТЕГРИРОВАННАЯ ЛОГИКА ---

        let bmr = 0;

        // 1. BMR (формула Миффлина-Сан Жеора)
        if (gender === "male") {
            bmr = 10 * weight + 6.25 * height - 5 * age + 5;
        } else {
            bmr = 10 * weight + 6.25 * height - 5 * age - 161;
        }

        // 2. Коэффициент активности
        const activityMap = {
            minimal: 1.2,
            low: 1.375,
            medium: 1.55,
            high: 1.725,
            extreme: 1.9
        };

        let calories = bmr * activityMap[activity];

        // 3. Корректировка под цель
        if (goal === "cut") {
            calories *= 0.85; // дефицит 15%
        } else if (goal === "bulk") {
            calories *= 1.15; // профицит 15%
        }
        // maintain = без изменений

        // 4. Белок по цели
        let proteinPerKg = 2.0;

        if (goal === "cut") proteinPerKg = 2.3;
        if (goal === "maintain") proteinPerKg = 2.0;
        if (goal === "bulk") proteinPerKg = 2.2;

        const fatPerKg = 0.9;

        let protein = weight * proteinPerKg;
        let fat = weight * fatPerKg;

        let proteinCalories = protein * 4;
        let fatCalories = fat * 9;

        // Добавлена защита (Math.max), чтобы углеводы не ушли в минус при экстрим значениях
        let carbs = Math.max((calories - proteinCalories - fatCalories) / 4, 0);

        // --- ВЫВОД НА ЭКРАН ---
        document.getElementById('resKcal').innerText = Math.round(calories);
        document.getElementById('resP').innerText = Math.round(protein);
        document.getElementById('resF').innerText = Math.round(fat);
        document.getElementById('resC').innerText = Math.round(carbs);

        document.getElementById('resultsArea').style.display = 'block';
    }

    // Слушатели событий: пересчитываем моментально при изменении текста (input) или списков (change)
    const inputs = document.querySelectorAll('input, select');
    inputs.forEach(element => {
        element.addEventListener('input', () => {
            if (document.getElementById('resultsArea').style.display === 'block') {
                calculate(true); 
            }
        });
        element.addEventListener('change', () => {
            if (document.getElementById('resultsArea').style.display === 'block') {
                calculate(true); 
            }
        });
    });
</script>

</body>
</html>
