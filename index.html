<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NutriCalc</title>
    <style>
        :root {
            /* Светлая тема */
            --accent: #007AFF;
            --accent-gradient: linear-gradient(135deg, #007AFF, #00C6FF);
            --accent-shadow: rgba(0, 122, 255, 0.2);
            --bg-light: #F2F2F7;
            --card-bg: #FFFFFF;
            --input-bg: #F9F9FB;
            --text-main: #1C1C1E;
            --text-dim: #8E8E93;
            --border: #E5E5EA;
        }

        .theme-female {
            --accent: #FF2D55;
            --accent-gradient: linear-gradient(135deg, #FF2D55, #FF5E7B);
            --accent-shadow: rgba(255, 45, 85, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .gender-switch {
            display: flex;
            background: var(--input-bg);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        .gender-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-dim);
        }

        .gender-btn.active {
            background: #FFFFFF;
            color: var(--accent);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 700;
            text-transform: uppercase;
            padding-left: 4px;
        }

        input, select {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            width: 100%;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            background: #FFFFFF;
        }

        .full-width {
            grid-column: span 3;
        }

        .calc-btn {
            background: var(--accent-gradient);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 8px 15px var(--accent-shadow);
        }

        .results {
            margin-top: 25px;
            background: var(--input-bg);
            border-radius: 18px;
            padding: 20px;
            display: none;
            border: 1px solid var(--border);
        }

        .res-main {
            text-align: center;
            margin-bottom: 15px;
        }

        .res-main span {
            display: block;
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 600;
        }

        .res-main strong {
            font-size: 36px;
            color: var(--text-main);
        }

        .macros {
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }

        .macro-card {
            flex: 1;
            background: #FFFFFF;
            padding: 12px 5px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .macro-card div:first-child {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
        }

        .macro-card div:last-child {
            font-size: 10px;
            color: var(--text-dim);
            font-weight: 700;
            text-transform: uppercase;
        }

        @media (max-width: 400px) {
            .grid-inputs { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="header">
        <h1>NutriCalc</h1>
    </div>

    <div class="gender-switch">
        <div class="gender-btn active" id="btnMale" onclick="setGender('male')">МУЖЧИНА</div>
        <div class="gender-btn" id="btnFemale" onclick="setGender('female')">ЖЕНЩИНА</div>
    </div>

    <div class="grid-inputs">
        <div class="input-group">
            <label>Возраст</label>
            <input type="number" id="age" value="25" min="10">
        </div>
        <div class="input-group">
            <label>Рост</label>
            <input type="number" id="height" value="180" min="100">
        </div>
        <div class="input-group">
            <label>Вес</label>
            <input type="number" id="weight" value="80" min="30">
        </div>

        <div class="input-group full-width">
            <label>Активность</label>
            <select id="activity">
                <option value="1.1">Минимальная</option>
                <option value="1.2">Низкая</option>
                <option value="1.35" selected>Средняя</option>
                <option value="1.55">Высокая</option>
            </select>
        </div>

        <div class="input-group full-width">
            <label>Цель</label>
            <select id="goal">
                <option value="loss">Похудение (-20%)</option>
                <option value="maintain" selected>Поддержание веса</option>
                <option value="gain">Набор массы (+10%)</option>
            </select>
        </div>
    </div>

    <button class="calc-btn" onclick="calculate()">Рассчитать</button>

    <div class="results" id="resultsArea">
        <div class="res-main">
            <span>Ваша норма:</span>
            <strong id="resKcal">0</strong> <small style="font-size: 14px; color: var(--text-dim)">ккал</small>
        </div>
        <div class="macros">
            <div class="macro-card">
                <div id="resP">0</div>
                <div>Белки</div>
            </div>
            <div class="macro-card">
                <div id="resF">0</div>
                <div>Жиры</div>
            </div>
            <div class="macro-card">
                <div id="resC">0</div>
                <div>Углеводы</div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentGender = 'male';

    function setGender(gender) {
        currentGender = gender;
        const container = document.getElementById('mainContainer');
        const btnM = document.getElementById('btnMale');
        const btnF = document.getElementById('btnFemale');

        if (gender === 'female') {
            container.classList.add('theme-female');
            btnF.classList.add('active');
            btnM.classList.remove('active');
        } else {
            container.classList.remove('theme-female');
            btnM.classList.add('active');
            btnF.classList.remove('active');
        }
        if(document.getElementById('resultsArea').style.display === 'block') calculate();
    }

    function calculate() {
        const age = parseFloat(document.getElementById('age').value);
        const height = parseFloat(document.getElementById('height').value);
        const weight = parseFloat(document.getElementById('weight').value);
        const activity = parseFloat(document.getElementById('activity').value);
        const goal = document.getElementById('goal').value;

        if (!age || !height || !weight) return;

        // Измененные формулы (уменьшенные коэффициенты)
        let bmr;
        if (currentGender === 'male') {
            // Чуть более консервативный расчет
            bmr = (9.2 * weight) + (4.8 * height) - (5.2 * age) - 20;
        } else {
            bmr = (8.8 * weight) + (4.2 * height) - (4.8 * age) - 170;
        }

        let tdee = bmr * activity;

        // Повышенный дефицит для похудения и уменьшенный профицит для набора
        let goalFactor = 1;
        if (goal === 'loss') goalFactor = 0.80; // -20% вместо -15%
        if (goal === 'gain') goalFactor = 1.10; // +10% вместо +15%

        const finalKcal = Math.round(tdee * goalFactor);

        // БЖУ: Акцент на белок, меньше углеводов
        const pGrams = Math.round((finalKcal * 0.30) / 4);
        const fGrams = Math.round((finalKcal * 0.25) / 9);
        const cGrams = Math.round((finalKcal - (pGrams * 4) - (fGrams * 9)) / 4);

        document.getElementById('resKcal').innerText = finalKcal;
        document.getElementById('resP').innerText = pGrams + 'г';
        document.getElementById('resF').innerText = fGrams + 'г';
        document.getElementById('resC').innerText = cGrams + 'г';

        document.getElementById('resultsArea').style.display = 'block';
    }
</script>

</body>
</html>
