<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Calorie & Macros Pro | Миффлин-Сан Жеор + Активность</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #f5f7fc 0%, #e9eef5 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 24px 16px 48px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* главный контейнер — адаптив, ~400-460px */
        .card {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 2px 5px rgba(0, 0, 0, 0.02);
            backdrop-filter: blur(0px);
            transition: all 0.2s;
            overflow: hidden;
        }

        .card-inner {
            padding: 28px 24px 36px;
        }

        /* заголовок */
        .logo {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        h1 {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(120deg, #1c3e55, #2b5f7a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .badge {
            background: #eef3fc;
            padding: 6px 12px;
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #2c6e9e;
        }
        .subhead {
            font-size: 0.85rem;
            color: #5b6f87;
            border-left: 3px solid #3b8fc2;
            padding-left: 12px;
            margin: 8px 0 24px 0;
            font-weight: 450;
        }

        /* поля ввода */
        .field {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e3a4d;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        label i {
            font-weight: 400;
            font-size: 0.8rem;
            color: #5f8db0;
        }
        input, select {
            width: 100%;
            padding: 16px 18px;
            font-size: 1rem;
            border: 1.5px solid #e2edf7;
            border-radius: 36px;
            background: #ffffff;
            transition: all 0.2s;
            font-weight: 500;
            color: #0a2636;
            outline: none;
            font-family: inherit;
        }
        input:focus, select:focus {
            border-color: #2e7eb0;
            box-shadow: 0 0 0 3px rgba(46, 126, 176, 0.15);
        }

        /* радио группа для пола */
        .radio-group {
            display: flex;
            gap: 20px;
            background: #f9fbfe;
            padding: 10px 16px;
            border-radius: 60px;
            border: 1px solid #e6edf6;
        }
        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.95rem;
        }
        .radio-option input {
            width: 18px;
            height: 18px;
            accent-color: #2e7eb0;
            margin: 0;
        }

        /* улучшенный стиль для селекта активности */
        .activity-select {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%233a7ca5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 18px center;
            appearance: none;
        }

        /* кнопка */
        .calc-btn {
            width: 100%;
            background: linear-gradient(105deg, #1f5e83, #2c7fb6);
            border: none;
            padding: 18px 16px;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            border-radius: 60px;
            margin: 16px 0 28px 0;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 18px rgba(0, 50, 70, 0.2);
            letter-spacing: 0.3px;
        }
        .calc-btn:active {
            transform: scale(0.97);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        /* блок результата — улучшенный дизайн */
        .result-card {
            background: linear-gradient(125deg, #f0f7ff, #ffffff);
            border-radius: 36px;
            padding: 20px 20px;
            border: 1px solid #cde3f5;
            transition: all 0.2s;
            box-shadow: 0 5px 12px rgba(0,0,0,0.02);
        }
        .result-header {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1f5779;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid #caddf0;
            padding-bottom: 10px;
            margin-bottom: 18px;
        }
        .kcal-circle {
            background: #ffffffcc;
            border-radius: 34px;
            padding: 12px 16px;
            text-align: center;
            margin-bottom: 20px;
            backdrop-filter: blur(2px);
            box-shadow: 0 2px 6px rgba(0,0,0,0.02), inset 0 1px 0 rgba(255,255,255,0.8);
        }
        .kcal-value {
            font-size: 2.6rem;
            font-weight: 800;
            color: #1c6f9b;
            letter-spacing: -1px;
            line-height: 1;
        }
        .kcal-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #5887aa;
        }
        .macros-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: space-between;
            margin-top: 6px;
        }
        .macro-item {
            flex: 1;
            background: white;
            border-radius: 28px;
            padding: 14px 8px;
            text-align: center;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.03);
            border: 1px solid #e3effa;
            transition: transform 0.1s;
        }
        .macro-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1f5779;
        }
        .macro-unit {
            font-size: 0.8rem;
            font-weight: 500;
            color: #5b7f9b;
        }
        .macro-name {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-top: 6px;
            color: #4c6f8c;
        }
        .macro-percent {
            font-size: 0.7rem;
            color: #7a9cbb;
            margin-top: 4px;
        }
        hr {
            margin: 16px 0 8px;
            border: none;
            border-top: 1px solid #d4e3f2;
        }
        .footnote {
            font-size: 0.7rem;
            text-align: center;
            color: #6b8bad;
            margin-top: 14px;
        }
        .error-message {
            background: #ffefef;
            color: #bc3f2e;
            padding: 16px;
            border-radius: 32px;
            font-weight: 500;
            font-size: 0.9rem;
            text-align: center;
        }

        @media (max-width: 480px) {
            .card-inner {
                padding: 20px 18px 28px;
            }
            .macro-number {
                font-size: 1.5rem;
            }
            .kcal-value {
                font-size: 2.2rem;
            }
            .radio-group {
                gap: 12px;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="card-inner">
        <div class="logo">
            <h1>⚡ NutriCalc</h1>
            <div class="badge">Mifflin-St Jeor</div>
        </div>
        <div class="subhead">Рассчитай калории и БЖУ с учётом пола, активности и цели</div>

        <!-- Пол -->
        <div class="field">
            <label>🧬 Пол</label>
            <div class="radio-group">
                <label class="radio-option">
                    <input type="radio" name="gender" value="male" checked> Мужской
                </label>
                <label class="radio-option">
                    <input type="radio" name="gender" value="female"> Женский
                </label>
            </div>
        </div>

        <!-- Возраст -->
        <div class="field">
            <label>📅 Возраст <i>(лет)</i></label>
            <input type="number" id="age" placeholder="28" value="30" min="15" max="120" step="1">
        </div>

        <!-- Рост -->
        <div class="field">
            <label>📏 Рост <i>(см)</i></label>
            <input type="number" id="height" placeholder="175" value="175" min="100" max="250" step="0.5">
        </div>

        <!-- Вес -->
        <div class="field">
            <label>⚖️ Вес <i>(кг)</i></label>
            <input type="number" id="weight" placeholder="70" value="70" min="30" max="250" step="0.5">
        </div>

        <!-- Уровень активности (НОВЫЙ БЛОК) -->
        <div class="field">
            <label>🏃‍♂️ Уровень активности</label>
            <select id="activity" class="activity-select">
                <option value="1.2">🛋️ Минимальный (сидячий образ жизни)</option>
                <option value="1.375">🚶‍♂️ Низкий (легкие прогулки 1-3 дня/нед)</option>
                <option value="1.55" selected>🏋️ Средний (тренировки 3-5 дней/нед)</option>
                <option value="1.725">🔥 Высокий (ежедневные нагрузки)</option>
                <option value="1.9">⚡ Экстремальный (спорт + физ. работа)</option>
            </select>
        </div>

        <!-- Цель -->
        <div class="field">
            <label>🎯 Цель</label>
            <select id="goal">
                <option value="loss">🔥 Похудение (дефицит 15%)</option>
                <option value="maintain" selected>✨ Поддержание формы</option>
                <option value="gain">💪 Набор массы (профицит 15%)</option>
            </select>
        </div>

        <button class="calc-btn" id="calculateBtn">Рассчитать норму →</button>

        <!-- Результат -->
        <div id="resultContainer">
            <div class="result-card" id="resultBlock">
                <div class="result-header">
                    <span>📊 Ваш персональный расчёт</span>
                </div>
                <div style="text-align: center; color: #54738f; padding: 12px 6px;">
                    Заполните параметры и нажмите «Рассчитать»
                </div>
            </div>
        </div>
        <div class="footnote">
            Формула Миффлина-Сан Жеора × активность × цель (дефицит/профицит). Все значения целые.
        </div>
    </div>
</div>

<script>
    (function() {
        // DOM elements
        const maleRadio = document.querySelector('input[value="male"]');
        const femaleRadio = document.querySelector('input[value="female"]');
        const ageInput = document.getElementById('age');
        const heightInput = document.getElementById('height');
        const weightInput = document.getElementById('weight');
        const activitySelect = document.getElementById('activity');
        const goalSelect = document.getElementById('goal');
        const calcBtn = document.getElementById('calculateBtn');
        const resultBlock = document.getElementById('resultBlock');

        // Helper: получение валидного числа
        function getValidNumber(input, fieldName, minVal, maxVal, isInteger = false) {
            let raw = input.value.trim();
            if (raw === "") throw new Error(`${fieldName} не может быть пустым.`);
            let num = isInteger ? parseInt(raw, 10) : parseFloat(raw);
            if (isNaN(num)) throw new Error(`${fieldName} должно быть числом.`);
            if (isInteger && !Number.isInteger(num)) throw new Error(`${fieldName} должно быть целым числом.`);
            if (num < minVal || num > maxVal) throw new Error(`${fieldName} должно быть от ${minVal} до ${maxVal}.`);
            return num;
        }

        // Получение пола
        function getGender() {
            return maleRadio.checked ? 'male' : 'female';
        }

        // Параметры цели (коэффициент коррекции и проценты БЖУ)
        function getGoalMacros(goal) {
            switch(goal) {
                case 'loss':
                    return { factor: 0.85, protein: 35, fat: 25, carbs: 40 };
                case 'maintain':
                    return { factor: 1.0, protein: 30, fat: 25, carbs: 45 };
                case 'gain':
                    return { factor: 1.15, protein: 25, fat: 25, carbs: 50 };
                default:
                    return { factor: 1.0, protein: 30, fat: 25, carbs: 45 };
            }
        }

        // Основной расчёт
        function calculate() {
            try {
                // 1. Валидация
                const age = getValidNumber(ageInput, 'Возраст', 15, 120, true);
                const height = getValidNumber(heightInput, 'Рост', 100, 250, false);
                const weight = getValidNumber(weightInput, 'Вес', 30, 250, false);
                const gender = getGender();
                const activityFactor = parseFloat(activitySelect.value);
                const goal = goalSelect.value;

                // 2. BMR по Миффлину-Сан Жеору
                let bmr;
                if (gender === 'male') {
                    bmr = 10 * weight + 6.25 * height - 5 * age + 5;
                } else {
                    bmr = 10 * weight + 6.25 * height - 5 * age - 161;
                }

                if (bmr <= 0 || !isFinite(bmr)) {
                    throw new Error("Некорректный базовый метаболизм, проверьте параметры.");
                }

                // 3. Умножаем на активность (получаем TDEE)
                let tdee = bmr * activityFactor;

                // 4. Коррекция под цель (похудение / поддержание / набор)
                const { factor, protein: proteinPct, fat: fatPct, carbs: carbPct } = getGoalMacros(goal);
                let dailyCalories = tdee * factor;

                // Округляем калории до целых
                dailyCalories = Math.round(dailyCalories);
                if (dailyCalories < 1000 && dailyCalories > 0) {
                    // допускаем, но можно предупредить (низкая калорийность, но оставляем)
                }
                if (dailyCalories <= 0) dailyCalories = 1200; // fallback safety

                // 5. Расчёт БЖУ в граммах (целые числа)
                let proteinGrams = (dailyCalories * (proteinPct / 100)) / 4;
                let fatGrams = (dailyCalories * (fatPct / 100)) / 9;
                let carbsGrams = (dailyCalories * (carbPct / 100)) / 4;

                // Округляем до целых граммов (требование "целые числа")
                proteinGrams = Math.round(proteinGrams);
                fatGrams = Math.round(fatGrams);
                carbsGrams = Math.round(carbsGrams);

                // Дополнительная проверка на крайне малые значения (но всё равно целые)
                if (proteinGrams < 0) proteinGrams = 0;
                if (fatGrams < 0) fatGrams = 0;
                if (carbsGrams < 0) carbsGrams = 0;

                // Расшифровка цели и активности для красивого отображения
                let goalText = "";
                if (goal === 'loss') goalText = "🔥 Похудение (дефицит)";
                else if (goal === 'maintain') goalText = "✨ Поддержание";
                else goalText = "💪 Набор массы (профицит)";

                let activityText = activitySelect.options[activitySelect.selectedIndex]?.text.split(' ')[0] || "Активность";

                // Формирование HTML результата
                resultBlock.innerHTML = `
                    <div class="result-header">
                        <span>🎯 ${goalText}</span>
                        <span style="font-size:0.7rem; background:#e7f0f9; padding:4px 8px; border-radius:40px;">${activityText}</span>
                    </div>
                    <div class="kcal-circle">
                        <div class="kcal-label">Суточная норма калорий</div>
                        <div class="kcal-value">${dailyCalories} <span style="font-size:1.2rem;">ккал</span></div>
                    </div>
                    <div class="macros-grid">
                        <div class="macro-item">
                            <div class="macro-number">${proteinGrams} <span class="macro-unit">г</span></div>
                            <div class="macro-name">🥩 Белки</div>
                            <div class="macro-percent">${proteinPct}% от калорий</div>
                        </div>
                        <div class="macro-item">
                            <div class="macro-number">${fatGrams} <span class="macro-unit">г</span></div>
                            <div class="macro-name">🧈 Жиры</div>
                            <div class="macro-percent">${fatPct}% от калорий</div>
                        </div>
                        <div class="macro-item">
                            <div class="macro-number">${carbsGrams} <span class="macro-unit">г</span></div>
                            <div class="macro-name">🍚 Углеводы</div>
                            <div class="macro-percent">${carbPct}% от калорий</div>
                        </div>
                    </div>
                    <hr>
                    <div class="footnote" style="margin-top: 10px;">
                        ✅ BMR × активность (${activityFactor}) × цель (${factor})<br>
                        Белки/углеводы = 4 ккал/г · Жиры = 9 ккал/г
                    </div>
                `;
            } catch (err) {
                resultBlock.innerHTML = `
                    <div class="result-header">
                        <span>⚠️ Ошибка</span>
                    </div>
                    <div class="error-message">
                        ${err.message}<br>
                        <span style="font-size:0.75rem;">Проверьте возраст (15-120), рост (100-250 см), вес (30-250 кг)</span>
                    </div>
                `;
            }
        }

        // обработчик клика
        calcBtn.addEventListener('click', (e) => {
            e.preventDefault();
            calculate();
        });

        // При загрузке страницы производим расчёт с данными по умолчанию (активность средняя, поддержание)
        window.addEventListener('DOMContentLoaded', () => {
            // Убедимся, что поля заполнены значениями по умолчанию (они уже есть в HTML)
            // вызовем calculate для демонстрации работы сервиса
            calculate();
        });
    })();
</script>
</body>
</html>
