<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NutriCalc</title>
    <style>
        :root {
            /* Light theme */
            --accent: #007AFF;
            --accent-gradient: linear-gradient(135deg, #007AFF, #00C6FF);
            --accent-shadow: rgba(0, 122, 255, 0.2);
            --bg-light: #F2F2F7;
            --card-bg: #FFFFFF;
            --input-bg: #F9F9FB;
            --text-main: #1C1C1E;
            --text-dim: #8E8E93;
            --border: #E5E5EA;
        }

        .theme-female {
            --accent: #FF2D55;
            --accent-gradient: linear-gradient(135deg, #FF2D55, #FF5E7B);
            --accent-shadow: rgba(255, 45, 85, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .gender-switch {
            display: flex;
            background: var(--input-bg);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        .gender-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-dim);
        }

        .gender-btn.active {
            background: #FFFFFF;
            color: var(--accent);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 700;
            text-transform: uppercase;
            padding-left: 4px;
        }

        input, select {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            width: 100%;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            background: #FFFFFF;
        }

        .full-width {
            grid-column: span 3;
        }

        .calc-btn {
            background: var(--accent-gradient);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 8px 15px var(--accent-shadow);
        }

        .calc-btn:active {
            transform: scale(0.98);
        }

        .results {
            margin-top: 25px;
            background: var(--input-bg);
            border-radius: 18px;
            padding: 20px;
            display: none;
            border: 1px solid var(--border);
        }

        .res-main {
            text-align: center;
            margin-bottom: 15px;
        }

        .res-main span {
            display: block;
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 600;
        }

        .res-main strong {
            font-size: 36px;
            color: var(--text-main);
        }

        .macros {
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }

        .macro-card {
            flex: 1;
            background: #FFFFFF;
            padding: 12px 5px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .macro-card div:first-child {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
        }

        .macro-card div:last-child {
            font-size: 10px;
            color: var(--text-dim);
            font-weight: 700;
            text-transform: uppercase;
        }

        @media (max-width: 400px) {
            .grid-inputs { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="header">
        <h1>NutriCalc</h1>
    </div>

    <div class="gender-switch">
        <button class="gender-btn active" id="btnMale" onclick="setGender('male')">МУЖЧИНА</button>
        <button class="gender-btn" id="btnFemale" onclick="setGender('female')">ЖЕНЩИНА</button>
    </div>

    <div class="grid-inputs">
        <div class="input-group">
            <label>Возраст</label>
            <input type="number" id="age" value="21" min="10" max="100">
        </div>
        <div class="input-group">
            <label>Рост (см)</label>
            <input type="number" id="height" value="178" min="100" max="250">
        </div>
        <div class="input-group">
            <label>Вес (кг)</label>
            <input type="number" id="weight" value="77" min="30" max="250">
        </div>

        <div class="input-group full-width">
            <label>Уровень активности</label>
            <select id="activity">
                <option value="1.2">Минимальная (сидячая работа)</option>
                <option value="1.375" selected>Низкая (1-3 тренировки в неделю)</option>
                <option value="1.55">Средняя (3-5 тренировок в неделю)</option>
				<option value="1.725">Высокая (ежедневные тренировки)</option>
                <option value="1.9">Экстремальная (профессиональный спорт)</option>
            </select>
        </div>

        <div class="input-group full-width">
            <label>Ваша цель</label>
            <select id="goal">
                <option value="loss" selected>Похудение (-15% дефицит)</option>
                <option value="maintain">Поддержание веса (баланс)</option>
                <option value="gain">Набор массы (+15% профицит)</option>
            </select>
        </div>
    </div>

    <button class="calc-btn" onclick="calculate()">Рассчитать норму</button>

    <div class="results" id="resultsArea">
        <div class="res-main">
            <span>СУТОЧНАЯ НОРМА:</span>
            <strong id="resKcal">0</strong> <small style="font-size: 14px; color: var(--text-dim)">ккал</small>
        </div>
        <div class="macros">
            <div class="macro-card">
                <div id="resP">0</div>
                <div>Белки</div>
            </div>
            <div class="macro-card">
                <div id="resF">0</div>
                <div>Жиры</div>
            </div>
            <div class="macro-card">
                <div id="resC">0</div>
                <div>Углеводы</div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentGender = 'male';

    function setGender(gender) {
        currentGender = gender;
        const container = document.getElementById('mainContainer');
        const btnM = document.getElementById('btnMale');
        const btnF = document.getElementById('btnFemale');

        if (gender === 'female') {
            container.classList.add('theme-female');
            btnF.classList.add('active');
            btnM.classList.remove('active');
        } else {
            container.classList.remove('theme-female');
            btnM.classList.add('active');
            btnF.classList.remove('active');
        }
        
        // Auto recalc on gender change if results are open
        if(document.getElementById('resultsArea').style.display === 'block') calculate();
    }

    function calculate() {
        const age = parseFloat(document.getElementById('age').value);
        const height = parseFloat(document.getElementById('height').value);
        const weight = parseFloat(document.getElementById('weight').value);
        const activity = parseFloat(document.getElementById('activity').value);
        const goal = document.getElementById('goal').value;

        // Base validation
        if (!age || !height || !weight || age <= 0 || height <= 0 || weight <= 0) {
            alert('Пожалуйста, введите корректные значения.');
            return;
        }

        // Mifflin-St Jeor Formula
        let bmr;
        if (currentGender === 'male') {
            bmr = (10 * weight) + (6.25 * height) - (5 * age) + 5;
        } else {
            bmr = (10 * weight) + (6.25 * height) - (5 * age) - 161;
        }

        // TDEE (Total Daily Energy Expenditure)
        let tdee = bmr * activity;

        // Adjust calories based on goal
        let finalKcal = tdee;
        if (goal === 'loss') {
            finalKcal = tdee * 0.85;
        } else if (goal === 'gain') {
            finalKcal = tdee * 1.15;
        }
        finalKcal = Math.round(finalKcal);

        // Macro Calculation (based on weight and leftovers)
        let weightInLbs = weight * 2.20462;
        
        // 1. Calculate Fat
        let fatGrams;
        if (currentGender === 'male') {
            fatGrams = (1 * weightInLbs) * 0.3;
        } else {
            fatGrams = (1 * weightInLbs) * 0.4;
        }
        
        // 2. Calculate Protein
        let proteinGrams = (1.5 * weightInLbs) * 0.3;
        
        // 3. Calculate Carbs based on leftover calories
        let fatCalories = fatGrams * 9;
        let proteinCalories = proteinGrams * 4;
        let leftoverCaloriesForCarbs = finalKcal - (fatCalories + proteinCalories);
        let carbGrams = leftoverCaloriesForCarbs / 4;
        
        // Round the final results
        let finalFatGrams = Math.round(fatGrams);
        let finalProteinGrams = Math.round(proteinGrams);
        let finalCarbGrams = Math.round(carbGrams);

        // Display the results
        document.getElementById('resKcal').innerText = finalKcal;
        document.getElementById('resP').innerText = finalProteinGrams + 'г';
        document.getElementById('resF').innerText = finalFatGrams + 'г';
        document.getElementById('resC').innerText = finalCarbGrams + 'г';

        // Show results area
        document.getElementById('resultsArea').style.display = 'block';
    }
</script>

</body>
</html>
