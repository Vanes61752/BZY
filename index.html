<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NutriCalc Sport Pro</title>
    <style>
        :root {
            /* Дефолтная мужская тема */
            --accent: #007AFF;
            --accent-gradient: linear-gradient(135deg, #007AFF, #00C6FF);
            --accent-shadow: rgba(0, 122, 255, 0.4);
            --bg-dark: #0F1218;
            --card-bg: #1C212D;
            --input-bg: #252B38;
            --text-main: #FFFFFF;
            --text-dim: #8E97A4;
        }

        /* Класс для женской темы (переключается через JS) */
        .theme-female {
            --accent: #FF2D55;
            --accent-gradient: linear-gradient(135deg, #FF2D55, #FF5E7B);
            --accent-shadow: rgba(255, 45, 85, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
            transition: background-color 0.4s ease, border-color 0.4s ease, color 0.4s ease, box-shadow 0.4s ease;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .header p {
            color: var(--text-dim);
            font-size: 13px;
        }

        /* Селектор пола */
        .gender-switch {
            display: flex;
            background: var(--input-bg);
            padding: 5px;
            border-radius: 15px;
            margin-bottom: 25px;
        }

        .gender-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            color: var(--text-dim);
        }

        .gender-btn.active {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 4px 15px var(--accent-shadow);
        }

        /* Поля ввода */
        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 600;
            padding-left: 5px;
        }

        input, select {
            background: var(--input-bg);
            border: 1px solid transparent;
            color: white;
            padding: 15px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            width: 100%;
        }

        input:focus, select:focus {
            border-color: var(--accent);
        }

        .full-width {
            grid-column: span 3;
            margin-top: 10px;
        }

        /* Кнопка */
        .calc-btn {
            background: var(--accent-gradient);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 10px 20px var(--accent-shadow);
            text-transform: uppercase;
        }

        .calc-btn:active {
            transform: scale(0.98);
        }

        /* Результаты */
        .results {
            margin-top: 30px;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 20px;
            display: none; /* Появится после расчета */
        }

        .res-main {
            text-align: center;
            margin-bottom: 20px;
        }

        .res-main span {
            display: block;
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .res-main strong {
            font-size: 42px;
            color: var(--accent);
            line-height: 1;
        }

        .macros {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .macro-card {
            flex: 1;
            background: var(--input-bg);
            padding: 15px 10px;
            border-radius: 15px;
            text-align: center;
            border-bottom: 3px solid var(--accent);
        }

        .macro-card div:first-child {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .macro-card div:last-child {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: 700;
        }

        @media (max-width: 400px) {
            .grid-inputs { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="header">
        <h1>NutriCalc <span style="font-weight: 300;">PRO</span></h1>
        <p>Персональный спортивный рацион</p>
    </div>

    <div class="gender-switch">
        <div class="gender-btn active" id="btnMale" onclick="setGender('male')">МУЖЧИНА</div>
        <div class="gender-btn" id="btnFemale" onclick="setGender('female')">ЖЕНЩИНА</div>
    </div>

    <div class="grid-inputs">
        <div class="input-group">
            <label>ВОЗРАСТ</label>
            <input type="number" id="age" value="25">
        </div>
        <div class="input-group">
            <label>РОСТ (СМ)</label>
            <input type="number" id="height" value="180">
        </div>
        <div class="input-group">
            <label>ВЕС (КГ)</label>
            <input type="number" id="weight" value="80">
        </div>

        <div class="input-group full-width">
            <label>АКТИВНОСТЬ</label>
            <select id="activity">
                <option value="1.2">Минимальная (сидячая)</option>
                <option value="1.375">Низкая (1-2 раза в неделю)</option>
                <option value="1.55" selected>Средняя (3-5 раз в неделю)</option>
                <option value="1.725">Высокая (каждый день)</option>
                <option value="1.9">Экстремальная (спорт + работа)</option>
            </select>
        </div>

        <div class="input-group full-width">
            <label>ЦЕЛЬ</label>
            <select id="goal">
                <option value="loss">Похудение (-15%)</option>
                <option value="maintain" selected>Поддержание веса</option>
                <option value="gain">Набор массы (+15%)</option>
            </select>
        </div>
    </div>

    <button class="calc-btn" onclick="calculate()">Рассчитать результат</button>

    <div class="results" id="resultsArea">
        <div class="res-main">
            <span>Ваша норма калорий:</span>
            <strong id="resKcal">0</strong> <small style="font-size: 16px; color: var(--text-dim)">ккал</small>
        </div>
        <div class="macros">
            <div class="macro-card">
                <div id="resP">0</div>
                <div>Белки</div>
            </div>
            <div class="macro-card">
                <div id="resF">0</div>
                <div>Жиры</div>
            </div>
            <div class="macro-card">
                <div id="resC">0</div>
                <div>Углеводы</div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentGender = 'male';

    function setGender(gender) {
        currentGender = gender;
        const container = document.getElementById('mainContainer');
        const btnM = document.getElementById('btnMale');
        const btnF = document.getElementById('btnFemale');

        if (gender === 'female') {
            container.classList.add('theme-female');
            btnF.classList.add('active');
            btnM.classList.remove('active');
        } else {
            container.classList.remove('theme-female');
            btnM.classList.add('active');
            btnF.classList.remove('active');
        }
        // Если уже есть результат, пересчитываем сразу при смене пола
        if(document.getElementById('resultsArea').style.display === 'block') calculate();
    }

    function calculate() {
        const age = parseFloat(document.getElementById('age').value);
        const height = parseFloat(document.getElementById('height').value);
        const weight = parseFloat(document.getElementById('weight').value);
        const activity = parseFloat(document.getElementById('activity').value);
        const goal = document.getElementById('goal').value;

        if (!age || !height || !weight) return alert("Заполните все поля!");

        // Формула Миффлина-Сан Жеора
        let bmr;
        if (currentGender === 'male') {
            bmr = (10 * weight) + (6.25 * height) - (5 * age) + 5;
        } else {
            bmr = (10 * weight) + (6.25 * height) - (5 * age) - 161;
        }

        // Применяем активность
        let tdee = bmr * activity;

        // Применяем цель
        let goalFactor = 1;
        if (goal === 'loss') goalFactor = 0.85;
        if (goal === 'gain') goalFactor = 1.15;

        const finalKcal = Math.round(tdee * goalFactor);

        // БЖУ (25% / 20% / 55%)
        // Белки и жиры считаем по процентам
        const pGrams = Math.round((finalKcal * 0.25) / 4);
        const fGrams = Math.round((finalKcal * 0.20) / 9);
        
        // Углеводы — остаток, чтобы математика была идеальной
        const cGrams = Math.round((finalKcal - (pGrams * 4) - (fGrams * 9)) / 4);

        // Вывод на экран
        document.getElementById('resKcal').innerText = finalKcal;
        document.getElementById('resP').innerText = pGrams + 'г';
        document.getElementById('resF').innerText = fGrams + 'г';
        document.getElementById('resC').innerText = cGrams + 'г';

        // Показываем блок с результатами
        document.getElementById('resultsArea').style.display = 'block';
    }
</script>

</body>
</html>
